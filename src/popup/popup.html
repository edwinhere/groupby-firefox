<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GroupBy</title>
    <link rel="stylesheet" href="../shared/styles.css" />
  </head>
  <body class="popup">
    <header>
      <h1>GroupBy</h1>
      <span id="summary" class="summary">…</span>
    </header>

    <button id="group-now" class="primary">Group tabs now</button>
    <button id="ungroup-all">Ungroup all</button>

    <div class="row">
      <label for="strategy">Group by</label>
      <select id="strategy"></select>
    </div>

    <div class="row">
      <label for="normalization">Normalize by</label>
      <select id="normalization">
        <option value="registrableDomain">Base domain (github.com)</option>
        <option value="hostname">Hostname (docs.github.com)</option>
      </select>
    </div>

    <div class="row">
      <label for="sort-mode">Sort within group</label>
      <select id="sort-mode">
        <option value="none">No sorting</option>
      </select>
    </div>

    <div class="row">
      <label for="trigram-threshold">Trigram threshold</label>
      <input id="trigram-threshold" type="number" min="0" max="1" step="0.05" />
    </div>

    <label class="row">
      <input id="auto-group" type="checkbox" />
      <span>Auto-grouping</span>
    </label>
    <label class="row">
      <input id="include-pinned" type="checkbox" />
      <span>Include pinned tabs</span>
    </label>
    <label class="row">
      <input id="ungroup-before" type="checkbox" />
      <span>Ungroup before each grouping</span>
    </label>

    <div id="status" class="status" aria-live="polite"></div>

    <footer>
      <a id="open-options" href="#">Options…</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
